  features:
    file_upload:
      image:
        enabled: false
        number_limits: 3
        detail: high
        transfer_methods:
        - remote_url
        - local_file
    opening_statement: ¡Hola! 🟠 Soy el asistente de membresia de Cobreloa. Puedo ayudarte con tu estado
      de socio, planes, pagos, escuelas de futbol o comunicarte con soporte. ¿En que te ayudo hoy?
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
      type: ''
      configs: []
    speech_to_text:
      enabled: false
    suggested_questions:
    - ¿Cual es mi estado de socio?
    - Quiero hacerme socio, ¿que planes tienen?
    - ¿Como pago mi cuota?
    - Informacion sobre las escuelas de futbol
    - Quiero hablar con soporte
