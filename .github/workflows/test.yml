name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docker compose syntax
        run: docker compose config > /dev/null
      
      - name: Check environment file
        run: test -f .env.example
